version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: foss-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: foss-distribution

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: foss-garage
    restart: unless-stopped
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
      - ./garage.toml:/etc/garage.toml:ro

volumes:
  mongo_data:
  garage_meta:
  garage_data:
